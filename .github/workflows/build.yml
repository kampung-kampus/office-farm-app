name: Build & Release AAB

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Find Android SDK and JDK paths
        run: |
          echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "JDK_PATH=$JAVA_HOME" >> $GITHUB_ENV
          echo "Android SDK is at: $ANDROID_SDK_ROOT"
          echo "JDK is at: $JAVA_HOME"

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Create twa-manifest.json
        run: |
          mkdir -p twa-build
          cat > twa-build/twa-manifest.json << 'EOF'
          {
            "packageId": "com.kampungkampus.officefarm",
            "host": "kampung-kampus.github.io",
            "name": "Office Farm",
            "launcherName": "OfficeFarm",
            "display": "standalone",
            "themeColor": "#1a2e1a",
            "navigationColor": "#1a2e1a",
            "navigationColorDark": "#0f1f0f",
            "navigationDividerColor": "#1a2e1a",
            "navigationDividerColorDark": "#0f1f0f",
            "backgroundColor": "#0f1f0f",
            "enableNotifications": false,
            "startUrl": "/office-farm-app/index.html",
            "iconUrl": "https://kampung-kampus.github.io/office-farm-app/icons/512.jpg",
            "maskableIconUrl": "https://kampung-kampus.github.io/office-farm-app/icons/512.jpg",
            "monochromeIconUrl": "https://kampung-kampus.github.io/office-farm-app/icons/512.jpg",
            "appVersion": "1",
            "appVersionName": "1.0.0",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://kampung-kampus.github.io/office-farm-app/manifest.json",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://kampung-kampus.github.io/office-farm-app/",
            "minSdkVersion": 21,
            "orientation": "portrait",
            "fingerprints": [],
            "signingKey": {
              "path": "../release.keystore",
              "alias": "officefarm"
            },
            "additionalTrustedOrigins": [],
            "retainedBundles": []
          }
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.keystore

      - name: Build AAB
        working-directory: twa-build
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath ../release.keystore \
            --signingKeyAlias officefarm \
            --signingKeyPassphrase "${{ secrets.KEY_STORE_PASSWORD }}" \
            --signingKeyStorePassphrase "${{ secrets.KEY_STORE_PASSWORD }}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: office-farm-release
          path: twa-build/app-release-bundle.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: twa-build/app-release-bundle.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

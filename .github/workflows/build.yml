name: Build & Release AAB

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set JAVA_HOME for Bubblewrap
        run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

     - name: Initialize TWA project
        run: |
          mkdir -p ~/.bubblewrap
          mkdir -p twa-build
          echo '{"jdkPath":"'"$JAVA_HOME_17_X64"'","androidSdkPath":"/usr/local/lib/android/sdk"}' > ~/.bubblewrap/config.json
          cd twa-build
          bubblewrap init \
            --manifest https://kampung-kampus.github.io/office-farm-app/manifest.json \
            --directory . \
            --skipPwaValidation

      - name: Setup Android SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build AAB
        working-directory: twa-build
        run: bubblewrap build --skipPwaValidation

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: office-farm-release
          path: twa-build/app-release-bundle.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: twa-build/app-release-bundle.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

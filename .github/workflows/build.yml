name: Build & Release AAB

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Setup Bubblewrap config
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'EOF'
          {
            "jdkPath": "/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/17.0.15-6/x64",
            "androidSdkPath": "/usr/local/lib/android/sdk"
          }
          EOF

      - name: Accept Android SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Initialize TWA project
        run: |
          mkdir -p twa-build
          cd twa-build
          bubblewrap init \
            --manifest https://kampung-kampus.github.io/office-farm-app/manifest.json \
            --directory . \
            --host kampung-kampus.github.io \
            --pathScope /office-farm-app/ \
            --startUrl /office-farm-app/index.html \
            --name "Office Farm" \
            --launcherName "OfficeFarm" \
            --themeColor "#1a2e1a" \
            --backgroundColor "#0f1f0f" \
            --packageId com.kampungkampus.officefarm \
            --skipPwaValidation

      - name: Build AAB
        working-directory: twa-build
        run: |
          bubblewrap build --skipPwaValidation

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: office-farm-release
          path: twa-build/app-release-bundle.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: twa-build/app-release-bundle.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release AAB

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Create Android TWA project
        run: |
          mkdir -p twa/app/src/main/res/values
          mkdir -p twa/app/src/main/res/drawable
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi

      - name: Create settings.gradle
        run: |
          cat > twa/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "OfficeFarm"
          include ':app'
          EOF

      - name: Create root build.gradle
        run: |
          cat > twa/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          EOF
      - name: Create app build.gradle
        run: |
          cat > twa/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.kampungkampus.officefarm'
              compileSdk 34
              defaultConfig {
                  applicationId "com.kampungkampus.officefarm"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="Office Farm"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://kampung-kampus.github.io/office-farm-app/index.html" />
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:resource="@color/colorPrimary" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data
                              android:scheme="https"
                              android:host="kampung-kampus.github.io"
                              android:pathPrefix="/office-farm-app" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create colors.xml
        run: |
          cat > twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#1a2e1a</color>
          </resources>
          EOF

      - name: Create styles.xml
        run: |
          cat > twa/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
              </style>
          </resources>
          EOF
          - name: Create app icon
         run: |
          mkdir -p twa/app/src/main/res/mipmap-mdpi
          mkdir -p twa/app/src/main/res/mipmap-hdpi
          mkdir -p twa/app/src/main/res/mipmap-xhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa/app/src/main/res/mipmap-xxxhdpi
          curl -L "https://kampung-kampus.github.io/office-farm-app/icons/512.jpg" -o icon.jpg
          convert icon.jpg -resize 48x48 twa/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert icon.jpg -resize 72x72 twa/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert icon.jpg -resize 96x96 twa/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert icon.jpg -resize 144x144 twa/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert icon.jpg -resize 192x192 twa/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      - name: Create gradle.properties
        run: |
          cat > twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
      - name: Create gradle wrapper
        working-directory: twa
        run: |
          gradle wrapper --gradle-version=8.4

      - name: Make gradlew executable
        working-directory: twa
        run: chmod +x gradlew

      - name: Build Release AAB
        working-directory: twa
        run: ./gradlew bundleRelease

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: twa/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: office-farm-release
          path: twa/app/build/outputs/bundle/release/*.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: twa/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
